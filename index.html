<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية النخبة</title>
    <style>
        body{background:#0f172a;color:#fff;font-family:Arial;text-align:center;margin:0;padding:20px}
        nav{background:#1e293b;padding:15px;margin:-20px -20px 30px;border-radius:0 0 10px 10px}
        .logo{font-size:24px;font-weight:bold;color:#ec4899}
        .nav{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-top:10px}
        .nav a{color:#06b6d4;text-decoration:none;padding:8px 15px;background:rgba(6,182,212,0.1);border-radius:20px}
        h1{color:#06b6d4;font-size:32px;margin:30px 0 15px}
        .card{background:#1e293b;padding:20px;margin:20px auto;max-width:500px;border-radius:10px;border:1px solid #ec4899}
        input,button{padding:12px;border-radius:25px;border:none;margin:5px}
        input{background:#0f172a;color:#fff;border:1px solid #06b6d4;text-align:center}
        button{background:linear-gradient(45deg,#6d28d9,#ec4899);color:#fff;font-weight:bold}
        #nameBox{margin:20px auto;max-width:300px}
    </style>
</head>
<body>
    <nav>
        <div class="logo">أكاديمية النخبة</div>
        <div class="nav">
            <a href="index.html">الرئيسية</a>
            <a href="about.html">عن الأكاديمية</a>
            <a href="projects.html">إنجازاتنا</a>
            <a href="calculator.html">الحاسبة</a>
            <a href="contact.html">تواصل</a>
        </div>
    </nav>
    
    <h1 id="welcome">أهلاً بك في أكاديمية النخبة</h1>
    <p id="desc">نصنع قادة المستقبل عبر مناهج عالمية</p>
    
    <div id="nameBox">
        <input type="text" id="userName" placeholder="اكتب اسمك هنا">
        <button onclick="saveName()">ابدأ</button>
    </div>
    
    <div class="card">
        <h3>مناهج تفاعلية</h3>
        <p>نعتمد التعلم بالمشاريع والتجارب العملية</p>
    </div>
    
    <div class="card">
        <h3>تسريع الإنجاز</h3>
        <p>برامج مكثفة تضمن إتقان المهارات في وقت قياسي</p>
    </div>

    <script>
        function saveName(){
            var name = document.getElementById('userName').value;
            if(name){
                localStorage.setItem('name',name);
                showName(name);
            }
        }
        function showName(name){
            document.getElementById('welcome').innerHTML = 'أهلاً ' + name + ' في أكاديمية النخبة';
            document.getElementById('desc').innerHTML = 'سعداء بانضمامك لنا يا ' + name;
            document.getElementById('nameBox').style.display = 'none';
        }
        var saved = localStorage.getItem('name');
        if(saved){ showName(saved); }
    </script>
</body>
</html>
