<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحاسبة الذكية - أكاديمية النخبة</title>
    <style>
        body{background:#0f172a;color:#fff;font-family:Arial;text-align:center;margin:0;padding:0}
        nav{background:#1e293b;padding:15px;margin-bottom:30px}
        .logo{font-size:24px;font-weight:bold;color:#ec4899}
        .nav{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-top:10px}
        .nav a{color:#06b6d4;text-decoration:none;padding:8px 15px;background:rgba(6,182,212,0.1);border-radius:20px}
        .nav a.active{background:linear-gradient(45deg,#6d28d9,#ec4899);color:#fff}
        h1{color:#06b6d4;font-size:32px;margin:20px 0}
        .card{background:#1e293b;padding:20px;margin:20px auto;max-width:400px;border-radius:10px;border:1px solid #ec4899}
        .card h3{color:#ec4899;margin-top:0}
        label{display:block;margin:10px 0 5px;text-align:right}
        input{width:90%;padding:12px;border-radius:25px;border:1px solid #06b6d4;background:#0f172a;color:#fff;text-align:center;font-size:16px}
        button{width:90%;padding:12px;border-radius:25px;border:none;margin:15px 0;background:linear-gradient(45deg,#6d28d9,#ec4899);color:#fff;font-weight:bold;font-size:16px;cursor:pointer}
        .result{margin-top:15px;padding:10px;background:rgba(6,182,212,0.1);border-radius:8px;border-right:4px solid #06b6d4;display:none;text-align:center}
    </style>
</head>
<body>
    <nav>
        <div class="logo">أكاديمية النخبة</div>
        <div class="nav">
            <a href="index.html">الرئيسية</a>
            <a href="about.html">عن الأكاديمية</a>
            <a href="projects.html">إنجازاتنا</a>
            <a href="calculator.html" class="active">الحاسبة</a>
            <a href="contact.html">تواصل</a>
        </div>
    </nav>
    
    <h1>الحاسبة التعليمية الذكية</h1>
    
    <div class="card">
        <h3>حجم الأسطوانة</h3>
        <label>نصف القطر (سم)</label>
        <input type="number" id="cylRadius" placeholder="مثال: 5">
        <label>الارتفاع (سم)</label>
        <input type="number" id="cylHeight" placeholder="مثال: 10">
        <button onclick="calcCylinder()">احسب الحجم</button>
        <div class="result" id="cylResult"></div>
    </div>
    
    <div class="card">
        <h3>مساحة الدائرة</h3>
        <label>نصف القطر (سم)</label>
        <input type="number" id="circleRadius" placeholder="مثال: 7">
        <button onclick="calcCircle()">احسب المساحة</button>
        <div class="result" id="circleResult"></div>
    </div>
    
    <div class="card">
        <h3>معادلة الدرجة الثانية</h3>
        <p style="opacity:0.7">أس² + بس + ج = 0</p>
        <label>المعامل أ</label><input type="number" id="coefA" placeholder="1">
        <label>المعامل ب</label><input type="number" id="coefB" placeholder="-5">
        <label>المعامل ج</label><input type="number" id="coefC" placeholder="6">
        <button onclick="solveQuadratic()">حل المعادلة</button>
        <div class="result" id="quadResult"></div>
    </div>

    <script>
        function calcCylinder(){
            var r = parseFloat(document.getElementById('cylRadius').value);
            var h = parseFloat(document.getElementById('cylHeight').value);
            var res = document.getElementById('cylResult');
            if(r>0 && h>0){
                var vol = Math.PI * r * r * h;
                res.innerHTML = 'الحجم = ' + vol.toFixed(2) + ' سم³';
                res.style.display = 'block';
            } else {
                res.innerHTML = 'أدخل قيم صحيحة أكبر من صفر';
                res.style.display = 'block';
            }
        }
        function calcCircle(){
            var r = parseFloat(document.getElementById('circleRadius').value);
            var res = document.getElementById('circleResult');
            if(r>0){
                var area = Math.PI * r * r;
                res.innerHTML = 'المساحة = ' + area.toFixed(2) + ' سم²';
                res.style.display = 'block';
            } else {
                res.innerHTML = 'أدخل نصف قطر صحيح';
                res.style.display = 'block';
            }
        }
        function solveQuadratic(){
            var a = parseFloat(document.getElementById('coefA').value);
            var b = parseFloat(document.getElementById('coefB').value);
            var c = parseFloat(document.getElementById('coefC').value);
            var res = document.getElementById('quadResult');
            if(!a){ res.innerHTML = 'المعامل أ لا يمكن أن يساوي صفر'; res.style.display = 'block'; return; }
            var d = b*b - 4*a*c;
            if(d>0){
                var x1 = (-b + Math.sqrt(d)) / (2*a);
                var x2 = (-b - Math.sqrt(d)) / (2*a);
                res.innerHTML = 'جذران: س₁ = ' + x1.toFixed(2) + ' ، س₂ = ' + x2.toFixed(2);
            } else if(d===0){
                var x = -b / (2*a);
                res.innerHTML = 'جذر واحد: س = ' + x.toFixed(2);
            } else {
                res.innerHTML = 'لا توجد جذور حقيقية';
            }
            res.style.display = 'block';
        }
    </script>
</body>
</html>
